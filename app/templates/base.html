<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}AmneziaWG WebUI{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
</head>
<body>
  {% block topbar %}
  <header class="topbar">
    <a href="/" class="brand"><span class="logo">🛡️</span> AWG WebUI</a>
    <nav>
      <a href="/">Серверы</a>
      <a href="/servers/new">+ Сервер</a>
      <span class="user">👤 {{ username }}</span>
      <a href="/logout" class="btn small">Выйти</a>
    </nav>
  </header>
  {% endblock %}
  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
